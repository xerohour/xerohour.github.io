<svg xmlns="http://www.w3.org/2000/svg" width="320" height="90" viewBox="0 0 320 90">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008f11;stop-opacity:1" />
    </linearGradient>
    <!-- Matrix rain drops -->
    <radialGradient id="glowGrad">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background with border -->
  <rect width="320" height="90" rx="4" fill="url(#bgGrad)" stroke="#00ff41" stroke-width="1.5"/>
  
  <!-- Decorative corner elements -->
  <path d="M5 15 L5 5 L15 5" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M305 15 L305 5 L295 5" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M5 75 L5 85 L15 85" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M305 75 L305 85 L295 85" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Email Icon with encryption overlay -->
  <circle cx="45" cy="45" r="28" fill="url(#textGrad)" opacity="0.08"/>
  <rect x="25" y="32" width="40" height="26" rx="4" stroke="url(#textGrad)" stroke-width="2" fill="none"/>
  <path d="M25 34 L45 47 L65 34" stroke="url(#textGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Encryption symbols -->
  <text x="45" y="22" font-family="Courier New, monospace" font-size="10" fill="#008f11" opacity="0.6">✦ ENCRYPTED ✦</text>
  
  <!-- Encrypted Email (ROT13 + visual obfuscation) -->
  <text x="80" y="42" font-family="Arial, sans-serif" font-size="9" fill="#005a00" font-weight="600" letter-spacing="1">ENCRYPTED EMAIL CHANNEL</text>
  <text x="80" y="62" font-family="Courier New, monospace" font-size="13" font-weight="700" fill="url(#textGrad)">
    <tspan x="80" dy="0">x</tspan><tspan dy="0">e</tspan><tspan dy="0">r</tspan><tspan dy="0">o</tspan><tspan dy="0">h</tspan><tspan dy="0">o</tspan><tspan dy="0">u</tspan><tspan dy="0">r</tspan>
    <tspan dy="0" fill="#00ff41">@</tspan>
    <tspan dy="0">g</tspan><tspan dy="0">m</tspan><tspan dy="0">a</tspan><tspan dy="0">i</tspan><tspan dy="0">l</tspan>
    <tspan dy="0" fill="#00ff41">.</tspan>
    <tspan dy="0">c</tspan><tspan dy="0">o</tspan><tspan dy="0">m</tspan>
  </text>
  
  <!-- Binary decoration -->
  <text x="280" y="82" font-family="Courier New, monospace" font-size="7" fill="#008f11" opacity="0.4">01001000</text>
</svg>
